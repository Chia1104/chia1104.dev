include:
  - db.docker-compose.yaml

services:
  service:
    container_name: chia-service
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        TURBO_TEAM: ${TURBO_TEAM:-}
        TURBO_TOKEN: ${TURBO_TOKEN:-}
    ports:
      - "8080:8080"
    env_file:
      - .env.global
      - apps/service/.env
    environment:
      - PORT=8080
      - LOCAL_DATABASE_URL=postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:?}
      - REDIS_URI=redis://redis:6379
      - INTERNAL_AUTH_SERVICE_ENDPOINT=http://host.docker.internal:4001
      - INTERNAL_WORKFLOW_SERVICE_ENDPOINT=http://workflow:8080
      - INTERNAL_WORKFLOW_SERVICE_TOKEN=${INTERNAL_WORKFLOW_SERVICE_TOKEN:-local-dev-token}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      workflow:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bun -e "fetch(''http://127.0.0.1:8080/api/v1/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  workflow:
    container_name: chia-workflow
    build:
      context: .
      dockerfile: apps/workflow/Dockerfile
      args:
        TURBO_TEAM: ${TURBO_TEAM:-}
        TURBO_TOKEN: ${TURBO_TOKEN:-}
    ports:
      - "8081:8080"
    env_file:
      - .env.global
      - apps/workflow/.env
    environment:
      - PORT=8080
      - LOCAL_DATABASE_URL=postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:?}
      - WORKFLOW_POSTGRES_URL=postgresql://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:?}
      - REDIS_URI=redis://redis:6379
      - WORKFLOW_REDIS_URI=redis://redis:6379
      - INTERNAL_WORKFLOW_SERVICE_TOKEN=${INTERNAL_WORKFLOW_SERVICE_TOKEN:-local-dev-token}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bun -e "fetch(''http://127.0.0.1:8080/workflow/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
