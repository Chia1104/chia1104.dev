name: auth Docker CI

on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize]
    paths:
      - "apps/auth/**"
      - "packages/auth/**"
      - "packages/db/**"
      - "packages/utils/**"
      - "packages/kv/**"
      - ".github/workflows/auth-docker-ci.yml"
      - "package.json"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pull-${{ github.ref }}-auth-docker-ci
  cancel-in-progress: true

env:
  APP_CODE: auth
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  GIT_HASH: ${{ github.sha }}

jobs:
  build:
    name: "auth docker build"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ (contains(github.event.pull_request.labels.*.name, 'auth:docker') || contains(github.event.pull_request.labels.*.name, 'area-auth')) && !contains(github.event.head_commit.message, '[skip ci]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
      - name: Set up Docker Builder
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/auth/Dockerfile
          push: false
          load: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/chia1104-auth:${{ env.GIT_HASH }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            TURBO_TEAM=${{ env.TURBO_TEAM }}
            TURBO_TOKEN=${{ env.TURBO_TOKEN }}
